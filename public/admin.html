<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TRIG Admin</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: Arial, sans-serif; margin: 0; background: #0f172a; color: #e5e7eb; }
    .wrap { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .grid { display: grid; grid-template-columns: 420px 1fr; gap: 18px; }
    .card { background: #111827; border: 1px solid #334155; border-radius: 14px; padding: 16px; }
    h1,h2,h3 { margin: 0 0 12px; }
    label { display: block; font-size: 12px; margin: 10px 0 6px; color: #cbd5e1; }
    input, select, textarea, button { width: 100%; box-sizing: border-box; border-radius: 10px; border: 1px solid #475569; padding: 10px 12px; }
    input, select, textarea { background: #0b1220; color: #e5e7eb; }
    textarea { min-height: 72px; resize: vertical; }
    button { background: #2563eb; color: white; cursor: pointer; margin-top: 12px; }
    button.secondary { background: #1f2937; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .tiny { font-size: 12px; color: #94a3b8; }
    .list { max-height: 75vh; overflow: auto; }
    .device { padding: 10px; border: 1px solid #334155; border-radius: 10px; margin-bottom: 8px; cursor: pointer; }
    .device.active { border-color: #60a5fa; background: #0b1220; }
    .badge { display: inline-block; padding: 3px 8px; border-radius: 999px; font-size: 11px; margin-right: 6px; }
    .ok { background: #14532d; }
    .bad { background: #7f1d1d; }
    pre { white-space: pre-wrap; word-break: break-word; background: #020617; border-radius: 10px; padding: 12px; border: 1px solid #334155; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid #334155; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>TRIG Admin</h1>
  <div class="tiny">Use the same X-Auth-Token as the CAP ALERT devices. This UI manages desired config versions and shows current device snapshots.</div>

  <div class="grid" style="margin-top:16px;">
    <div class="card">
      <h2>API</h2>
      <label>API Base URL</label>
      <input id="baseUrl" value="" placeholder="http://27.131.170.216:8082" />
      <label>X-Auth-Token</label>
      <input id="token" value="" placeholder="shared token" />
      <div class="row">
        <div>
          <label>Online filter</label>
          <select id="onlineFilter">
            <option value="">All</option>
            <option value="1">Online only</option>
            <option value="0">Offline only</option>
          </select>
        </div>
        <div>
          <label>Device ISO</label>
          <input id="deviceIsoFilter" placeholder="TH-10" />
        </div>
      </div>
      <button id="refreshBtn">Refresh Devices</button>
      <div id="summary" class="tiny" style="margin-top:10px;"></div>

      <h3 style="margin-top:20px;">Devices</h3>
      <div id="deviceList" class="list"></div>
    </div>

    <div class="card">
      <h2 id="detailTitle">Device Details</h2>
      <div id="detailBody" class="tiny">Pick a device from the left.</div>

      <div id="editor" style="display:none; margin-top: 12px;">
        <div class="row">
          <div>
            <label>Player IP</label>
            <input id="playerIp" />
          </div>
          <div>
            <label>Normal Playlist</label>
            <input id="normalPlaylist" />
          </div>
        </div>

        <label>Basic Auth</label>
        <input id="basicAuth" placeholder="Basic ..." />

        <div class="row">
          <div>
            <label>Combined CAP URL</label>
            <input id="capUrl" />
          </div>
          <div>
            <label>Device ISO</label>
            <input id="deviceIso" placeholder="TH-10" />
          </div>
        </div>

        <div class="row">
          <div><label>Poll Sec</label><input id="pollSec" type="number" /></div>
          <div><label>Heartbeat Sec</label><input id="hbSec" type="number" /></div>
        </div>
        <div class="row">
          <div><label>Cycles</label><input id="cycles" type="number" /></div>
          <div><label>Event Play Sec</label><input id="eventPlaySec" type="number" /></div>
        </div>
        <div class="row">
          <div>
            <label>Event Play Mode</label>
            <select id="eventPlayMode">
              <option value="0">Fixed duration</option>
              <option value="1">Until alert expires</option>
            </select>
          </div>
          <div><label>Normal Hold Sec</label><input id="normalHoldSec" type="number" /></div>
        </div>

        <div class="row">
          <div>
            <label>Use Identifier</label>
            <select id="useIdentifier"><option value="true">true</option><option value="false">false</option></select>
          </div>
          <div>
            <label>Allow Stale Trigger</label>
            <select id="allowStaleTrigger"><option value="false">false</option><option value="true">true</option></select>
          </div>
        </div>

        <label>TRIG URL</label>
        <input id="trigUrl" />
        <label>TRIG Token</label>
        <input id="trigToken" />

        <label>Event mappings (JSON array)</label>
        <textarea id="eventsJson" placeholder='[{"key":"PRA","enabled":true,"playlist":"PRA","minRank":0}]'></textarea>

        <button id="saveBtn">Push Config</button>
        <div id="saveStatus" class="tiny" style="margin-top:10px;"></div>

        <h3 style="margin-top:22px;">Current Snapshot</h3>
        <pre id="snapshotPre"></pre>

        <h3 style="margin-top:22px;">Recent Logs</h3>
        <button id="loadLogsBtn" class="secondary">Load Logs</button>
        <pre id="logsPre"></pre>
      </div>
    </div>
  </div>
</div>

<script>
const state = { selectedDeviceId: null, desiredVersion: null };

function headers() {
  return {
    'Content-Type': 'application/json',
    'X-Auth-Token': document.getElementById('token').value.trim(),
  };
}
function baseUrl() {
  return document.getElementById('baseUrl').value.trim().replace(/\/$/, '');
}
async function api(path, opts = {}) {
  const res = await fetch(baseUrl() + path, { ...opts, headers: { ...(opts.headers || {}), ...headers() } });
  const data = await res.json().catch(() => ({}));
  if (!res.ok || data.ok === false) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}
function badge(text, ok) {
  return `<span class="badge ${ok ? 'ok' : 'bad'}">${text}</span>`;
}
function setValue(id, v) { document.getElementById(id).value = v ?? ''; }
function setBool(id, v, fallback = false) { document.getElementById(id).value = String(v ?? fallback); }

async function refreshDevices() {
  const iso = document.getElementById('deviceIsoFilter').value.trim();
  const online = document.getElementById('onlineFilter').value;
  const q = new URLSearchParams();
  if (iso) q.set('deviceIso', iso);
  if (online) q.set('online', online);
  const [summary, devices] = await Promise.all([
    api('/api/summary'),
    api('/api/devices?' + q.toString()),
  ]);
  document.getElementById('summary').textContent = `Total ${summary.totalDevices} | Online ${summary.onlineDevices} | Offline ${summary.offlineDevices}`;
  const box = document.getElementById('deviceList');
  box.innerHTML = '';
  for (const d of devices.devices) {
    const div = document.createElement('div');
    div.className = 'device' + (d.deviceId === state.selectedDeviceId ? ' active' : '');
    div.innerHTML = `
      <div><strong>${d.deviceId}</strong></div>
      <div class="tiny">${badge(d.online ? 'online' : 'offline', d.online)} ${badge(d.playerOk ? 'player ok' : 'player fail', !!d.playerOk)}</div>
      <div class="tiny">ISO: ${d.deviceIso || '-'} | Applied V: ${d.appliedConfigVersion ?? '-'}</div>
      <div class="tiny">Seen: ${d.lastSeenAt || '-'}</div>`;
    div.onclick = () => loadDevice(d.deviceId);
    box.appendChild(div);
  }
}

async function loadDevice(deviceId) {
  state.selectedDeviceId = deviceId;
  const data = await api('/api/device/' + encodeURIComponent(deviceId));
  const d = data.device;
  const desired = data.desiredConfig?.desired || d.configSnapshot || {};
  state.desiredVersion = data.desiredConfig?.version ?? null;

  document.getElementById('detailTitle').textContent = deviceId;
  document.getElementById('detailBody').innerHTML = `
    <div>${badge(d.online ? 'online' : 'offline', d.online)} ${badge(d.lastConfigApplyOk !== false ? 'config ok' : 'config error', d.lastConfigApplyOk !== false)}</div>
    <div class="tiny">Last seen: ${d.lastSeenAt || '-'} | Last IP: ${d.lastSeenIp || '-'}</div>
    <div class="tiny">FW: ${d.fwVersion || '-'} | Applied Version: ${d.appliedConfigVersion ?? '-'}</div>
    <div class="tiny">Last config apply: ${d.lastConfigAppliedAt || '-'} ${d.lastConfigApplyError ? '| ' + d.lastConfigApplyError : ''}</div>`;
  document.getElementById('editor').style.display = 'block';

  setValue('playerIp', desired.playerIp || '');
  setValue('basicAuth', desired.basicAuth || '');
  setValue('normalPlaylist', desired.normalPlaylist || '');
  setValue('capUrl', desired.capUrl || '');
  setValue('deviceIso', desired.deviceIso || d.deviceIso || '');
  setValue('pollSec', desired.pollSec ?? 30);
  setValue('cycles', desired.cycles ?? 1);
  setValue('eventPlaySec', desired.eventPlaySec ?? 60);
  setValue('eventPlayMode', desired.eventPlayMode ?? 0);
  setValue('normalHoldSec', desired.normalHoldSec ?? 30);
  setBool('useIdentifier', desired.useIdentifier, true);
  setBool('allowStaleTrigger', desired.allowStaleTrigger, false);
  setValue('trigUrl', desired.trigUrl || baseUrl());
  setValue('trigToken', desired.trigToken || document.getElementById('token').value.trim());
  document.getElementById('eventsJson').value = JSON.stringify(desired.events || d.configSnapshot?.events || [], null, 2);
  document.getElementById('snapshotPre').textContent = JSON.stringify(d.configSnapshot || {}, null, 2);
  document.getElementById('logsPre').textContent = '';
  refreshDevices();
}

async function saveConfig() {
  if (!state.selectedDeviceId) return;
  const saveStatus = document.getElementById('saveStatus');
  saveStatus.textContent = 'Saving...';
  let events = [];
  try {
    const raw = document.getElementById('eventsJson').value.trim();
    events = raw ? JSON.parse(raw) : [];
  } catch (e) {
    saveStatus.textContent = 'Invalid events JSON';
    return;
  }

  const desired = {
    playerIp: document.getElementById('playerIp').value.trim(),
    basicAuth: document.getElementById('basicAuth').value.trim(),
    normalPlaylist: document.getElementById('normalPlaylist').value.trim(),
    capUrl: document.getElementById('capUrl').value.trim(),
    deviceIso: document.getElementById('deviceIso').value.trim(),
    pollSec: Number(document.getElementById('pollSec').value),
    cycles: Number(document.getElementById('cycles').value),
    eventPlaySec: Number(document.getElementById('eventPlaySec').value),
    eventPlayMode: Number(document.getElementById('eventPlayMode').value),
    normalHoldSec: Number(document.getElementById('normalHoldSec').value),
    useIdentifier: document.getElementById('useIdentifier').value === 'true',
    allowStaleTrigger: document.getElementById('allowStaleTrigger').value === 'true',
    trigUrl: document.getElementById('trigUrl').value.trim(),
    trigToken: document.getElementById('trigToken').value.trim(),
    hbSec: Number(document.getElementById('hbSec').value),
    events,
  };

  try {
    const resp = await api('/api/config/' + encodeURIComponent(state.selectedDeviceId), {
      method: 'POST',
      body: JSON.stringify({ desired }),
    });
    saveStatus.textContent = `Saved version ${resp.version}. Device will apply on next heartbeat.`;
    state.desiredVersion = resp.version;
    await loadDevice(state.selectedDeviceId);
  } catch (e) {
    saveStatus.textContent = e.message;
  }
}

async function loadLogs() {
  if (!state.selectedDeviceId) return;
  try {
    const resp = await api('/api/device/logs?deviceId=' + encodeURIComponent(state.selectedDeviceId) + '&limit=100');
    document.getElementById('logsPre').textContent = resp.rows.map(r => `${r.ts} [${r.level}] ${r.msg}`).join('\n');
  } catch (e) {
    document.getElementById('logsPre').textContent = e.message;
  }
}

document.getElementById('refreshBtn').onclick = refreshDevices;
document.getElementById('saveBtn').onclick = saveConfig;
document.getElementById('loadLogsBtn').onclick = loadLogs;

const savedBase = localStorage.getItem('trig.baseUrl');
const savedToken = localStorage.getItem('trig.token');
if (savedBase) document.getElementById('baseUrl').value = savedBase;
if (savedToken) document.getElementById('token').value = savedToken;
if (!savedBase) document.getElementById('baseUrl').value = location.origin;

for (const id of ['baseUrl', 'token']) {
  document.getElementById(id).addEventListener('change', () => {
    localStorage.setItem('trig.baseUrl', document.getElementById('baseUrl').value.trim());
    localStorage.setItem('trig.token', document.getElementById('token').value.trim());
  });
}

refreshDevices().catch(err => {
  document.getElementById('summary').textContent = err.message;
});
</script>
</body>
</html>
